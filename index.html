<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algspelet</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f5c7a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #game {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg,
                #051c2e 0%,
                #0a3155 15%,
                #0d4a6e 35%,
                #0f5c7a 50%,
                #126a6a 65%,
                #1a6e5c 80%,
                #1f5c4a 90%,
                #1a4a3a 100%
            );
            overflow: hidden;
        }

        /* Ljusstrålar från ytan */
        .light-ray {
            position: absolute;
            top: -10%;
            width: 120px;
            height: 110%;
            background: linear-gradient(180deg,
                rgba(180, 220, 255, 0.12) 0%,
                rgba(180, 220, 255, 0.06) 30%,
                rgba(180, 220, 255, 0.02) 60%,
                transparent 100%
            );
            z-index: 1;
            pointer-events: none;
            transform-origin: top center;
            animation: rayShimmer 8s ease-in-out infinite;
        }

        @keyframes rayShimmer {
            0%, 100% { opacity: 0.6; transform: skewX(-2deg) scaleX(1); }
            25% { opacity: 0.9; transform: skewX(1deg) scaleX(1.1); }
            50% { opacity: 0.5; transform: skewX(-1deg) scaleX(0.9); }
            75% { opacity: 0.8; transform: skewX(2deg) scaleX(1.05); }
        }

        /* Vattenpartikel-dimma */
        .water-fog {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(10, 60, 80, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(10, 50, 70, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(15, 55, 50, 0.3) 0%, transparent 40%);
            z-index: 2;
            pointer-events: none;
        }

        /* Sandbotten */
        #ocean-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 18%;
            z-index: 3;
            pointer-events: none;
        }

        #ocean-floor svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Dekorationer på botten */
        #decorations {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25%;
            z-index: 4;
            pointer-events: none;
        }

        #decorations svg {
            width: 100%;
            height: 100%;
        }

        /* Röd linje i mitten */
        #divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg,
                rgba(255, 50, 50, 0.7) 0%,
                rgba(255, 50, 50, 0.4) 50%,
                rgba(255, 50, 50, 0.6) 100%
            );
            z-index: 50;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3), 0 0 5px rgba(255, 50, 50, 0.5);
        }

        /* Poäng */
        .score {
            position: absolute;
            top: 20px;
            font-size: 3rem;
            font-weight: bold;
            z-index: 60;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 30px currentColor;
        }

        #score1 {
            left: 20%;
            color: #4fc3f7;
            transform: translateX(-50%);
        }

        #score2 {
            right: 20%;
            color: #ff8a65;
            transform: translateX(50%);
        }

        .score-label {
            position: absolute;
            top: 75px;
            font-size: 1rem;
            z-index: 60;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
            opacity: 0.8;
        }

        #label1 {
            left: 20%;
            color: #4fc3f7;
            transform: translateX(-50%);
        }

        #label2 {
            right: 20%;
            color: #ff8a65;
            transform: translateX(50%);
        }

        /* Alger (SVG-baserade) */
        .alg {
            position: absolute;
            bottom: 12%;
            z-index: 10;
            cursor: pointer;
            transform-origin: bottom center;
        }

        .alg svg {
            overflow: visible;
            filter: drop-shadow(0 0 3px rgba(0, 80, 0, 0.3));
        }

        /* Explosion */
        .explosion {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .explosion-particle {
            position: absolute;
            border-radius: 50%;
            animation: explode 0.5s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Explosion ring */
        .explosion-ring {
            position: absolute;
            border: 3px solid rgba(255, 200, 50, 0.8);
            border-radius: 50%;
            animation: ringExpand 0.4s ease-out forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes ringExpand {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        /* Vinnare */
        #winner-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #winner-screen.show {
            display: flex;
        }

        #winner-text {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            margin-bottom: 30px;
        }

        #play-again {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #fff;
            color: #333;
            font-weight: bold;
            transition: transform 0.1s;
        }

        #play-again:hover {
            transform: scale(1.05);
        }

        #play-again:active {
            transform: scale(0.95);
        }

        /* Bubblor */
        .bubble {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0.03));
            z-index: 5;
            animation: rise linear forwards;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.7; }
            25% { transform: translateY(-25vh) translateX(8px) scale(0.95); opacity: 0.6; }
            50% { transform: translateY(-50vh) translateX(-5px) scale(0.9); opacity: 0.5; }
            75% { transform: translateY(-75vh) translateX(6px) scale(0.8); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(0) scale(0.7); opacity: 0; }
        }

        /* Drivande partiklar i vattnet */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(200, 230, 200, 0.15);
            z-index: 2;
            pointer-events: none;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); opacity: 0.3; }
            25% { transform: translate(15px, -10px); opacity: 0.5; }
            50% { transform: translate(-10px, -25px); opacity: 0.3; }
            75% { transform: translate(20px, -15px); opacity: 0.4; }
            100% { transform: translate(0, 0); opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="game">
        <!-- Ljusstrålar -->
        <div class="light-ray" style="left: 8%; width: 80px; animation-delay: 0s; animation-duration: 7s;"></div>
        <div class="light-ray" style="left: 22%; width: 100px; animation-delay: 1.5s; animation-duration: 9s;"></div>
        <div class="light-ray" style="left: 38%; width: 60px; animation-delay: 3s; animation-duration: 6s;"></div>

        <div class="light-ray" style="left: 82%; width: 70px; animation-delay: 4s; animation-duration: 7.5s;"></div>

        <!-- Vattendimma -->
        <div class="water-fog"></div>

        <!-- Havsbotten (sand med ojämn yta) -->
        <div id="ocean-floor">
            <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">

                        <stop offset="60%" stop-color="#6B5535"/>

                    <filter id="sandTexture">
                        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/>
                        <feColorMatrix type="saturate" values="0"/>
                        <feBlend in="SourceGraphic" mode="multiply"/>
                    </filter>
                </defs>
                <!-- Ojämn sandkant -->
                <path d="M0,60 C50,45 100,55 150,40 C200,30 250,50 300,35 C350,25 400,45 450,38
                         C500,30 550,48 600,32 C650,25 700,42 750,35 C800,28 850,46 900,38
                         C950,30 1000,48 1050,40 C1100,32 1150,50 1200,42 L1200,200 L0,200 Z"
                      fill="url(#sandGrad)" filter="url(#sandTexture)"/>
                <!-- Ljusare sandtoppar -->
                <path d="M0,60 C50,45 100,55 150,40 C200,30 250,50 300,35 C350,25 400,45 450,38
                         C500,30 550,48 600,32 C650,25 700,42 750,35 C800,28 850,46 900,38
                         C950,30 1000,48 1050,40 C1100,32 1150,50 1200,42 L1200,55 C1150,63 1100,45 1050,53
                         C1000,61 950,43 900,51 C850,59 800,41 750,48 C700,55 650,38 600,45
                         C550,61 500,43 450,51 C400,58 350,38 300,48 C250,63 200,43 150,53
                         C100,68 50,58 0,73 Z"
                      fill="rgba(160, 140, 100, 0.3)"/>
            </svg>
        </div>

        <!-- Dekorationer: stenar, snäckor, sjöstjärnor, koraller -->
        <div id="decorations">
            <svg viewBox="0 0 1200 250" preserveAspectRatio="none">
                <!-- Stenar -->
                <ellipse cx="80" cy="195" rx="35" ry="22" fill="#5a5a5a" opacity="0.8"/>
                <ellipse cx="80" cy="195" rx="35" ry="22" fill="url(#stoneShade)" opacity="0.4"/>
                <ellipse cx="95" cy="200" rx="20" ry="14" fill="#6a6a6a" opacity="0.7"/>

                <ellipse cx="350" cy="205" rx="28" ry="16" fill="#4f4f4f" opacity="0.8"/>
                <ellipse cx="340" cy="208" rx="15" ry="10" fill="#5d5d5d" opacity="0.6"/>

                <ellipse cx="700" cy="198" rx="40" ry="20" fill="#555" opacity="0.8"/>
                <ellipse cx="715" cy="202" rx="22" ry="13" fill="#666" opacity="0.6"/>

                <ellipse cx="1050" cy="202" rx="30" ry="18" fill="#4a4a4a" opacity="0.8"/>
                <ellipse cx="1060" cy="206" rx="18" ry="11" fill="#5c5c5c" opacity="0.6"/>

                <ellipse cx="550" cy="210" rx="20" ry="12" fill="#585858" opacity="0.7"/>

                <ellipse cx="920" cy="205" rx="25" ry="15" fill="#525252" opacity="0.75"/>

                <!-- Koraller -->
                <!-- Korall 1 - förgrenad -->
                <g transform="translate(180, 175)" opacity="0.85">
                    <path d="M0,40 Q2,25 -5,12 Q-7,5 -3,0" stroke="#e05555" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M0,40 Q-2,28 5,15 Q8,8 12,2" stroke="#d44" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                    <path d="M0,40 Q5,30 2,20 Q0,14 -8,8" stroke="#c54040" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <circle cx="-3" cy="0" r="2.5" fill="#ff7777"/>
                    <circle cx="12" cy="2" r="2.5" fill="#ff6666"/>
                    <circle cx="-8" cy="8" r="2" fill="#ee6060"/>
                </g>

                <!-- Korall 2 - rund typ -->
                <g transform="translate(850, 178)" opacity="0.8">
                    <ellipse cx="0" cy="15" rx="18" ry="15" fill="#d4845a"/>
                    <ellipse cx="-5" cy="10" rx="8" ry="7" fill="#e09570" opacity="0.6"/>
                    <ellipse cx="6" cy="8" rx="6" ry="5" fill="#daa080" opacity="0.5"/>
                    <circle cx="-8" cy="14" r="1.5" fill="#c07050"/>
                    <circle cx="0" cy="9" r="1.5" fill="#c07050"/>
                    <circle cx="8" cy="13" r="1.5" fill="#c07050"/>
                    <circle cx="-3" cy="18" r="1.5" fill="#c07050"/>
                    <circle cx="5" cy="19" r="1.5" fill="#c07050"/>
                </g>

                <!-- Korall 3 - liten rosa -->
                <g transform="translate(480, 185)" opacity="0.8">
                    <path d="M0,30 Q1,20 -3,10 Q-4,5 -1,0" stroke="#e080a0" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M0,30 Q-1,22 4,12 Q6,6 8,2" stroke="#d77090" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <circle cx="-1" cy="0" r="2" fill="#ff99bb"/>
                    <circle cx="8" cy="2" r="2" fill="#ff90b0"/>
                </g>

                <!-- Korall 4 -->
                <g transform="translate(1120, 180)" opacity="0.8">
                    <path d="M0,35 Q2,22 -4,10 Q-5,4 -2,0" stroke="#cc6644" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                    <path d="M0,35 Q-3,25 3,15 Q5,8 9,3" stroke="#bb5533" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M0,35 Q4,28 -2,18 Q-5,12 -10,7" stroke="#aa5040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <circle cx="-2" cy="0" r="2" fill="#ee8866"/>
                    <circle cx="9" cy="3" r="2" fill="#dd7755"/>
                    <circle cx="-10" cy="7" r="1.8" fill="#dd7755"/>
                </g>

                <!-- Snäckor -->
                <!-- Spiralsnäcka 1 -->
                <g transform="translate(250, 202) rotate(-15)" opacity="0.8">
                    <path d="M0,0 Q8,-2 10,4 Q12,10 6,12 Q0,14 -2,8 Q-4,3 2,2 Q5,1 6,5"
                          stroke="#ddc8a0" stroke-width="2" fill="#eeddbb" stroke-linecap="round"/>
                </g>

                <!-- Spiralsnäcka 2 -->
                <g transform="translate(630, 208) rotate(10)" opacity="0.75">
                    <path d="M0,0 Q7,-1 9,4 Q11,9 5,11 Q-1,12 -1,7 Q-1,3 3,2 Q5,1 5,4"
                          stroke="#c8b490" stroke-width="1.8" fill="#e0d0b0" stroke-linecap="round"/>
                </g>

                <!-- Mussla -->
                <g transform="translate(450, 205)" opacity="0.8">
                    <path d="M-10,5 Q-8,-5 0,-8 Q8,-5 10,5 Q5,8 0,7 Q-5,8 -10,5 Z" fill="#c0b0a0"/>
                    <path d="M0,-8 Q-1,0 -8,5" stroke="#a09080" stroke-width="0.8" fill="none"/>
                    <path d="M0,-8 Q0,0 0,7" stroke="#a09080" stroke-width="0.8" fill="none"/>
                    <path d="M0,-8 Q1,0 8,5" stroke="#a09080" stroke-width="0.8" fill="none"/>
                </g>

                <!-- Sjöstjärnor -->
                <!-- Sjöstjärna 1 (orange) -->
                <g transform="translate(150, 205) rotate(20)" opacity="0.85">
                    <path d="M0,-12 L2,-4 L10,-4 L4,1 L6,9 L0,5 L-6,9 L-4,1 L-10,-4 L-2,-4 Z"
                          fill="#e07830" stroke="#c06020" stroke-width="0.5"/>
                    <circle cx="0" cy="-1" r="2" fill="#cc6828" opacity="0.5"/>
                </g>

                <!-- Sjöstjärna 2 (röd) -->
                <g transform="translate(780, 210) rotate(-10)" opacity="0.8">
                    <path d="M0,-10 L1.5,-3 L8,-3 L3,1 L5,7.5 L0,4 L-5,7.5 L-3,1 L-8,-3 L-1.5,-3 Z"
                          fill="#cc4444" stroke="#aa3333" stroke-width="0.5"/>
                    <circle cx="0" cy="-0.5" r="1.5" fill="#bb3838" opacity="0.5"/>
                </g>

                <!-- Sjöstjärna 3 (lila, liten) -->
                <g transform="translate(990, 208) rotate(35)" opacity="0.75">
                    <path d="M0,-8 L1.2,-2.5 L6.5,-2.5 L2.5,0.8 L4,6 L0,3.2 L-4,6 L-2.5,0.8 L-6.5,-2.5 L-1.2,-2.5 Z"
                          fill="#9966aa" stroke="#774488" stroke-width="0.5"/>

                <defs>
                    <radialGradient id="stoneShade">
                        <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
                        <stop offset="100%" stop-color="black" stop-opacity="0.3"/>

                </defs>
            </svg>
        </div>

        <div id="divider"></div>

        <div id="score1" class="score">0</div>
        <div id="label1" class="score-label">Spelare 1</div>

        <div id="score2" class="score">0</div>
        <div id="label2" class="score-label">Spelare 2</div>

        <div id="winner-screen">
            <div id="winner-text"></div>
            <button id="play-again">Spela igen!</button>
        </div>
    </div>

    <script>
        const game = document.getElementById('game');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const winnerScreen = document.getElementById('winner-screen');
        const winnerText = document.getElementById('winner-text');
        const playAgainBtn = document.getElementById('play-again');

        let score1 = 0;
        let score2 = 0;
        let gameOver = false;
        let alger = [];
        let spawnInterval = 1200;
        let spawnTimer = null;
        let difficultyTimer = null;
        const WIN_SCORE = 30;

        // ---- Skapa drivande partiklar ----
        function initParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (6 + Math.random() * 10) + 's';
                p.style.animationDelay = (-Math.random() * 10) + 's';
                game.appendChild(p);
            }
        }
        initParticles();

        // ---- Ljud med Web Audio API ----
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEeeoo(up) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const now = audioCtx.currentTime;
            if (up) {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
            } else {
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.linearRampToValueAtTime(200, now + 0.3);
            }
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.35);
            osc.start(now);
            osc.stop(now + 0.35);
        }

        function playExplosionSound() {
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

        function playWinSound() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.value = freq;
                const t = audioCtx.currentTime + i * 0.15;
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

        // ---- Alger (SVG-baserade, mer realistiska) ----
        const algColorSets = [
            { stem: '#2d6e2d', leaf: '#3a8c3a', leafDark: '#256025', tip: '#50a850' },
            { stem: '#1e5c2e', leaf: '#2d7a3d', leafDark: '#1a4e22', tip: '#40904a' },
            { stem: '#2a6633', leaf: '#3d8840', leafDark: '#1f5528', tip: '#55a055' },
            { stem: '#1f5f3a', leaf: '#2e7e4a', leafDark: '#184e2e', tip: '#45954e' },
            { stem: '#336b2e', leaf: '#459038', leafDark: '#285a24', tip: '#5aaa48' },
        ];

        function createSeaweedSVG(maxHeight, colorSet) {
            const svgNS = 'http://www.w3.org/2000/svg';
            const width = 60;
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', width);
            svg.setAttribute('height', maxHeight + 20);
            svg.setAttribute('viewBox', `0 0 ${width} ${maxHeight + 20}`);
            svg.style.overflow = 'visible';

            const defs = document.createElementNS(svgNS, 'defs');

            // Gradient för stammen
            const stemGrad = document.createElementNS(svgNS, 'linearGradient');
            stemGrad.id = 'sg_' + Math.random().toString(36).slice(2, 8);
            stemGrad.setAttribute('x1', '0'); stemGrad.setAttribute('y1', '1');
            stemGrad.setAttribute('x2', '0'); stemGrad.setAttribute('y2', '0');
            const s1 = document.createElementNS(svgNS, 'stop');
            s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', colorSet.stem);
            const s2 = document.createElementNS(svgNS, 'stop');
            s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', colorSet.tip);
            stemGrad.appendChild(s1); stemGrad.appendChild(s2);
            defs.appendChild(stemGrad);
            svg.appendChild(defs);

            // Stam - kurvad path
            const cx = width / 2;
            const stemWave1 = (Math.random() - 0.5) * 12;
            const stemWave2 = (Math.random() - 0.5) * 10;
            const stemPath = document.createElementNS(svgNS, 'path');
            stemPath.setAttribute('stroke', `url(#${stemGrad.id})`);
            stemPath.setAttribute('stroke-width', '5');
            stemPath.setAttribute('fill', 'none');
            stemPath.setAttribute('stroke-linecap', 'round');
            svg.appendChild(stemPath);

            // Löv - mer realistiska bladformer
            const leafCount = 4 + Math.floor(Math.random() * 4);
            const leafElements = [];
            for (let i = 0; i < leafCount; i++) {
                const leafG = document.createElementNS(svgNS, 'g');
                leafG.style.opacity = '0';
                leafG.style.transition = 'opacity 0.3s';

                const side = i % 2 === 0 ? -1 : 1;
                const leafHeight = ((i + 1) / (leafCount + 1)) * maxHeight;
                const leafLen = 12 + Math.random() * 14;
                const leafCurve = 4 + Math.random() * 5;

                // Blad som SVG path (naturlig bladform)
                const leaf = document.createElementNS(svgNS, 'path');
                const lx = 0;
                const ly = 0;
                const endX = side * leafLen;
                const endY = -3 - Math.random() * 4;
                const cp1x = side * leafLen * 0.4;
                const cp1y = -leafCurve;
                const cp2x = side * leafLen * 0.7;
                const cp2y = endY - leafCurve * 0.5;
                const cp3x = side * leafLen * 0.7;
                const cp3y = endY + leafCurve * 0.8;
                const cp4x = side * leafLen * 0.3;
                const cp4y = leafCurve * 0.6;

                leaf.setAttribute('d',
                    `M${lx},${ly} C${cp1x},${cp1y} ${cp2x},${cp2y} ${endX},${endY} C${cp3x},${cp3y} ${cp4x},${cp4y} ${lx},${ly} Z`
                );
                leaf.setAttribute('fill', colorSet.leaf);
                leaf.setAttribute('stroke', colorSet.leafDark);
                leaf.setAttribute('stroke-width', '0.5');

                // Mittnerv på bladet
                const vein = document.createElementNS(svgNS, 'path');
                vein.setAttribute('d', `M${lx},${ly} Q${side * leafLen * 0.5},${-leafCurve * 0.3} ${endX},${endY}`);
                vein.setAttribute('stroke', colorSet.leafDark);
                vein.setAttribute('stroke-width', '0.6');
                vein.setAttribute('fill', 'none');
                vein.setAttribute('opacity', '0.5');

                leafG.appendChild(leaf);
                leafG.appendChild(vein);
                svg.appendChild(leafG);

                leafElements.push({
                    el: leafG,
                    height: leafHeight,
                    side,
                    baseX: cx + stemWave1 * (leafHeight / maxHeight),
                });
            }

            return { svg, stemPath, leafElements, cx, stemWave1, stemWave2, stemGradId: stemGrad.id };
        }

        function updateSeaweedPath(algObj) {
            const { svgData, maxHeight, currentHeight } = algObj;
            const { cx, stemWave1, stemWave2, stemPath, leafElements } = svgData;
            const h = currentHeight;
            const bottom = maxHeight + 20;

            // Kurvad stam
            const mid1Y = bottom - h * 0.33;
            const mid2Y = bottom - h * 0.66;
            const topY = bottom - h;
            const wave1 = stemWave1 * (h / maxHeight);
            const wave2 = stemWave2 * (h / maxHeight);

            stemPath.setAttribute('d',
                `M${cx},${bottom} C${cx + wave1 * 0.3},${mid1Y + 10} ${cx + wave1},${mid1Y} ${cx + wave1 * 0.7},${mid1Y}` +
                ` S${cx + wave2},${mid2Y} ${cx + wave2 * 0.5},${topY}`
            );

            // Placera och visa/dölj löv
            for (const leaf of leafElements) {
                if (h >= leaf.height) {
                    leaf.el.style.opacity = '1';
                    const t = leaf.height / maxHeight;
                    const lx = cx + stemWave1 * t * 0.7 + stemWave2 * t * 0.3;
                    const ly = bottom - leaf.height;
                    leaf.el.setAttribute('transform', `translate(${lx}, ${ly})`);
                } else {
                    leaf.el.style.opacity = '0';
                }
            }
        }

        function createAlg() {
            if (gameOver) return;

            const side = Math.random() < 0.5 ? 'left' : 'right';
            const gameRect = game.getBoundingClientRect();
            const halfW = gameRect.width / 2;

            let xMin, xMax;
            if (side === 'left') {
                xMin = 30;
                xMax = halfW - 30;
            } else {
                xMin = halfW + 30;
                xMax = gameRect.width - 30;
            }

            const x = xMin + Math.random() * (xMax - xMin);
            const maxHeight = 80 + Math.random() * 150;
            const colorSet = algColorSets[Math.floor(Math.random() * algColorSets.length)];

            const svgData = createSeaweedSVG(maxHeight, colorSet);

            const el = document.createElement('div');
            el.className = 'alg';
            el.style.left = (x - 30) + 'px';
            el.style.width = '60px';
            el.appendChild(svgData.svg);

            game.appendChild(el);

            const algObj = {
                el,
                svgData,
                side,
                x,
                maxHeight,
                currentHeight: 0,
                phase: 'growing',
                growSpeed: 3.5 + Math.random() * 2,
                pauseTime: 600 + Math.random() * 800,
                pauseStart: 0,
                shrinkSpeed: 3 + Math.random() * 2,
                swayOffset: Math.random() * Math.PI * 2,
            };

            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (gameOver || algObj.phase === 'dead') return;
                hitAlg(algObj);
            });

            alger.push(algObj);
            playEeeoo(true);
        }

        function hitAlg(algObj) {
            algObj.phase = 'dead';

            if (algObj.side === 'left') {
                score1++;
                score1El.textContent = score1;
                score1El.style.transform = 'translateX(-50%) scale(1.3)';
                setTimeout(() => score1El.style.transform = 'translateX(-50%) scale(1)', 150);
            } else {
                score2++;
                score2El.textContent = score2;
                score2El.style.transform = 'translateX(50%) scale(1.3)';
                setTimeout(() => score2El.style.transform = 'translateX(50%) scale(1)', 150);
            }

            const rect = algObj.el.getBoundingClientRect();
            const gameRect = game.getBoundingClientRect();
            const cx = rect.left + rect.width / 2 - gameRect.left;
            const cy = rect.top + rect.height * 0.3 - gameRect.top;
            createExplosion(cx, cy);
            playExplosionSound();

            algObj.el.remove();
            alger = alger.filter(a => a !== algObj);

            if (score1 >= WIN_SCORE) {
                endGame('Spelare 1 vinner!', '#4fc3f7');
            } else if (score2 >= WIN_SCORE) {
                endGame('Spelare 2 vinner!', '#ff8a65');
            }
        }

        function createExplosion(x, y) {
            const container = document.createElement('div');
            container.className = 'explosion';
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            // Ring
            const ring = document.createElement('div');
            ring.className = 'explosion-ring';
            container.appendChild(ring);

            // Partiklar - blandning av gröna (algbitar) och ljusa
            const colors = ['#66bb6a', '#43a047', '#ffeb3b', '#fff9c4', '#81c784', '#a5d6a7', '#ff9800'];
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'explosion-particle';
                const angle = (Math.PI * 2 * i) / 18 + (Math.random() - 0.5) * 0.3;
                const dist = 30 + Math.random() * 60;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                const size = 3 + Math.random() * 7;
                p.style.width = size + 'px';
                p.style.height = size * (0.5 + Math.random() * 0.8) + 'px';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(p);
            }

            game.appendChild(container);
            setTimeout(() => container.remove(), 600);
        }

        // ---- Bubblor ----
        function createBubble() {
            if (gameOver) return;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = 3 + Math.random() * 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.bottom = (5 + Math.random() * 15) + '%';
            bubble.style.animationDuration = (5 + Math.random() * 8) + 's';
            game.appendChild(bubble);
            setTimeout(() => bubble.remove(), 13000);
        }

        // ---- Game loop ----
        let lastTime = 0;

        function gameLoop(time) {
            if (gameOver) return;

            const dt = lastTime ? (time - lastTime) : 16;
            lastTime = time;

            for (let i = alger.length - 1; i >= 0; i--) {
                const a = alger[i];

                // Vaja-effekt
                const sway = Math.sin(time / 600 + a.swayOffset) * 4;
                a.el.style.transform = `translateX(${sway}px)`;

                if (a.phase === 'growing') {
                    a.currentHeight += a.growSpeed * (dt / 16);
                    if (a.currentHeight >= a.maxHeight) {
                        a.currentHeight = a.maxHeight;
                        a.phase = 'pausing';
                        a.pauseStart = time;
                    }
                } else if (a.phase === 'pausing') {
                    if (time - a.pauseStart >= a.pauseTime) {
                        a.phase = 'shrinking';
                        playEeeoo(false);
                    }
                } else if (a.phase === 'shrinking') {
                    a.currentHeight -= a.shrinkSpeed * (dt / 16);
                    if (a.currentHeight <= 0) {
                        a.currentHeight = 0;
                        a.phase = 'dead';
                        a.el.remove();
                        alger.splice(i, 1);
                        continue;
                    }
                }

                updateSeaweedPath(a);
            }

            requestAnimationFrame(gameLoop);
        }

        function startSpawning() {
            if (spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                if (!gameOver) createAlg();
            }, spawnInterval);
        }

        function increaseDifficulty() {
            difficultyTimer = setInterval(() => {
                if (gameOver) return;
                if (spawnInterval > 250) {
                    spawnInterval -= 80;
                    startSpawning();
                }
            }, 4000);
        }

        function endGame(text, color) {
            gameOver = true;
            clearInterval(spawnTimer);
            clearInterval(difficultyTimer);
            winnerText.textContent = text;
            winnerText.style.color = color;
            winnerScreen.classList.add('show');
            playWinSound();
        }

        function resetGame() {
            gameOver = false;
            score1 = 0;
            score2 = 0;
            score1El.textContent = '0';
            score2El.textContent = '0';
            winnerScreen.classList.remove('show');
            alger.forEach(a => a.el.remove());
            alger = [];
            spawnInterval = 1200;
            lastTime = 0;
            startSpawning();
            increaseDifficulty();
            requestAnimationFrame(gameLoop);
        }

        // ---- Init ----
        playAgainBtn.addEventListener('click', resetGame);

        setInterval(createBubble, 1500);
        createAlg();
        startSpawning();
        increaseDifficulty();
        requestAnimationFrame(gameLoop);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
